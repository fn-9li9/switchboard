services:
  # ─── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    container_name: switchboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-switchboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-switchboard}
      POSTGRES_DB: ${POSTGRES_DB:-switchboard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-switchboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: switchboard-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-switchboard}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-switchboard}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: switchboard-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: switchboard-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "zookeeper-shell localhost:2181 ls / > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: switchboard-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Migrate (job que corre una vez y termina) ────────────────

  migrate:
    image: migrate/migrate:v4
    container_name: switchboard-migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-switchboard}:${POSTGRES_PASSWORD:-switchboard}@postgres:5432/${POSTGRES_DB:-switchboard}?sslmode=disable"
      - "up"
    restart: on-failure

  # ─── Go services ─────────────────────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    container_name: switchboard-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      APP_ENV: prod
      GATEWAY_SERVER_PORT: 8080
      GATEWAY_POSTGRES_DSN: postgres://${POSTGRES_USER:-switchboard}:${POSTGRES_PASSWORD:-switchboard}@postgres:5432/${POSTGRES_DB:-switchboard}?sslmode=disable
      GATEWAY_REDIS_ADDR: redis:6379
      GATEWAY_REDIS_PASSWORD: ${REDIS_PASSWORD:-switchboard}
      GATEWAY_NATS_URL: nats://nats:4222
      GATEWAY_KAFKA_BROKERS: kafka:29092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  notifier:
    build:
      context: .
      dockerfile: docker/notifier.Dockerfile
    container_name: switchboard-notifier
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: prod
      NOTIFIER_SERVER_PORT: 8081
      NOTIFIER_REDIS_ADDR: redis:6379
      NOTIFIER_REDIS_PASSWORD: ${REDIS_PASSWORD:-switchboard}
      NOTIFIER_NATS_URL: nats://nats:4222
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  processor:
    build:
      context: .
      dockerfile: docker/processor.Dockerfile
    container_name: switchboard-processor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      kafka:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: prod
      PROCESSOR_SERVER_PORT: 8082
      PROCESSOR_POSTGRES_DSN: postgres://${POSTGRES_USER:-switchboard}:${POSTGRES_PASSWORD:-switchboard}@postgres:5432/${POSTGRES_DB:-switchboard}?sslmode=disable
      PROCESSOR_REDIS_ADDR: redis:6379
      PROCESSOR_REDIS_PASSWORD: ${REDIS_PASSWORD:-switchboard}
      PROCESSOR_NATS_URL: nats://nats:4222
      PROCESSOR_KAFKA_BROKERS: kafka:29092
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:

networks:
  default:
    name: switchboard-net
