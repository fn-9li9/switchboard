<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
    <style type="text/tailwindcss">
        @theme {
      --color-ctp-rosewater: #f5e0dc;
      --color-ctp-flamingo:  #f2cdcd;
      --color-ctp-pink:      #f5c2e7;
      --color-ctp-mauve:     #cba6f7;
      --color-ctp-red:       #f38ba8;
      --color-ctp-maroon:    #eba0ac;
      --color-ctp-peach:     #fab387;
      --color-ctp-yellow:    #f9e2af;
      --color-ctp-green:     #a6e3a1;
      --color-ctp-teal:      #94e2d5;
      --color-ctp-sky:       #89dceb;
      --color-ctp-sapphire:  #74c7ec;
      --color-ctp-blue:      #89b4fa;
      --color-ctp-lavender:  #b4befe;
      --color-ctp-text:      #cdd6f4;
      --color-ctp-subtext1:  #bac2de;
      --color-ctp-subtext0:  #a6adc8;
      --color-ctp-overlay2:  #9399b2;
      --color-ctp-overlay1:  #7f849c;
      --color-ctp-overlay0:  #6c7086;
      --color-ctp-surface2:  #585b70;
      --color-ctp-surface1:  #45475a;
      --color-ctp-surface0:  #313244;
      --color-ctp-base:      #1e1e2e;
      --color-ctp-mantle:    #181825;
      --color-ctp-crust:     #11111b;
    }
  </style>
</head>

<body class="bg-ctp-base text-ctp-text min-h-screen font-mono">

    <nav class="bg-ctp-mantle border-b border-ctp-surface1 px-6 py-3 flex items-center gap-2">
        <a href="/" class="text-ctp-mauve font-bold text-lg tracking-widest mr-6">⚡ switchboard</a>
        <a href="/postgres" class="px-3 py-1 rounded text-ctp-subtext0 hover:text-ctp-green  hover:bg-ctp-surface0 transition-colors text-sm">Postgres</a>
        <a href="/redis" class="px-3 py-1 rounded text-ctp-subtext0 hover:text-ctp-red     hover:bg-ctp-surface0 transition-colors text-sm">Redis</a>
        <a href="/nats" class="px-3 py-1 rounded text-ctp-subtext0 hover:text-ctp-sapphire hover:bg-ctp-surface0 transition-colors text-sm">NATS</a>
        <a href="/ws" class="px-3 py-1 rounded text-ctp-subtext0 hover:text-ctp-yellow  hover:bg-ctp-surface0 transition-colors text-sm">WebSocket</a>
        <a href="/kafka" class="px-3 py-1 rounded text-ctp-subtext0 hover:text-ctp-peach   hover:bg-ctp-surface0 transition-colors text-sm">Kafka</a>
        <a href="/firehose" class="px-3 py-1 rounded text-ctp-subtext0 hover:text-ctp-pink    hover:bg-ctp-surface0 transition-colors text-sm">Firehose</a>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-8">
        {{template "content" .}}
    </main>

</body>

</html>
