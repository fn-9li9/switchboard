env: dev
service: gateway

server:
  host: 0.0.0.0
  port: 8080

postgres:
  dsn: postgres://switchboard:switchboard@localhost:5432/switchboard?sslmode=disable
  max_conns: 10
  min_conns: 2
  max_idle_secs: 300

redis:
  addr: localhost:6379
  db: 0

nats:
  url: nats://localhost:4222

notifier_url: http://localhost:8081
processor_url: http://localhost:8082

auth:
  session_duration: 720h
  mfa_issuer: switchboard

app:
  url: http://localhost:8080